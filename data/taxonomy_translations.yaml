# taxonomy_translations.yaml
# Cross-language slug mapping for taxonomy terms with different Chinese/English slugs.
# Used by layouts/partials/extend_head.html to inject hreflang alternates.
#
# MAINTENANCE: When adding a new tag/category/series that has different
# Chinese and English names, add a pair here. Tags with identical slugs
# in both languages (e.g., "AI", "TDD", "GEAR") do NOT need mapping.
#
# Values can be raw terms or pre-urlized slugs — the template applies
# urlize() to both sides at runtime, so any format works.

pairs:

